name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Cible du déploiement
        type: choice
        options: [production, staging]
        default: production

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prérendu SSR avec données API prod)
        run: npm run build

      - name: Deploy FTP (${{ env.TARGET }})
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ env.TARGET == 'staging' && '/www/v2' || '/www/front' }}
        run: node scripts/ftp-deploy.mjs

      - name: Install Playwright (chromium)
        if: env.TARGET == 'production'
        run: npx playwright install --with-deps chromium

      - name: Smoke test post-deploy
        if: env.TARGET == 'production'
        env:
          BASE_URL: https://gardee.fr
        run: npm run smoke
