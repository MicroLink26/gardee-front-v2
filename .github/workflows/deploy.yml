name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Cible du déploiement
        type: choice
        options: [production, staging]
        default: production

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'production' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (prérendu SSR avec données API prod)
        run: npm run build

      - name: Deploy FTP (${{ env.TARGET }})
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ env.TARGET == 'staging' && '/www/v2' || '/www/front' }}
        run: node scripts/ftp-deploy.mjs

      - name: Install Playwright (chromium)
        if: env.TARGET == 'production'
        run: npx playwright install --with-deps chromium

      - name: Smoke test post-deploy
        if: env.TARGET == 'production'
        env:
          BASE_URL: https://gardee.fr
        run: npm run smoke

      - name: Trigger docs rebuild
        if: env.TARGET == 'production' && github.event_name == 'push'
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/MicroLink26/gardee-docs/dispatches \
            -d '{"event_type":"docs-rebuild","client_payload":{"source":"gardee-front-v2"}}'
