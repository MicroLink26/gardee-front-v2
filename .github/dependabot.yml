version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    labels: [dependencies]
    ignore:
      # Ne pas mettre à jour astro 5→6 sans migration volontaire
      - dependency-name: astro
        update-types: [version-update:semver-major]
